apiVersion: botmother.module/v1

module:
  id: youtube
  name: YouTube
  version: 0.1.1
  description: YouTube video/audio'ni yt-dlp bilan yuklab platformaga saqlaydi va fayl UUID'ini (yt_file) qaytaradi. Send*Node file_id bilan yuboradi.
  author: yourname
  icon: globe

source:
  github: https://github.com/BotSpace/yt-dlp-module
  # endpoint: https://my-server.com

runtime:
  dockerfile: Dockerfile
  port: 8100
  healthcheck: /health

contract:
  jsonrpc: "2.0"
  endpoint: /rpc
  methods: [describe, node.execute, trigger.match, docs]

provides:
  nodes:
    - type: youtube.Download
      trigger: false
